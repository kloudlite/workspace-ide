name: Docker

on:
  push:
    branches: [master]
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          cat > ~/.ssh/id_ed25519 << 'EOF'
${{ secrets.SSH_KEY }}
EOF
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H kmac.khost.dev >> ~/.ssh/known_hosts

      - name: Build and push on remote host
        env:
          TAG: ${{ github.ref_name == 'master' && 'latest' || github.ref_name }}
          IMAGE: ghcr.io/kloudlite/workspace-ide
        run: |
          tar czf - --exclude target --exclude .git . | ssh karthik@kmac.khost.dev "
            rm -rf /tmp/ws-build
            mkdir -p /tmp/ws-build
            cd /tmp/ws-build
            tar xzf -
            docker run --rm -v /tmp/ws-build:/src -w /src rust:latest cargo build --release
            docker build -t ws:temp -f Dockerfile .
            docker tag ws:temp $IMAGE:$TAG
            docker push $IMAGE:$TAG
          "
