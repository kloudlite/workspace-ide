name: Docker

on:
  push:
    branches: [master]
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H kmac.khost.dev >> ~/.ssh/known_hosts

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Set up Dagger
        uses: dagger/dagger-for-github@v7
        with:
          version: "latest"

      - name: Build and publish on kmac
        run: |
          TAG="${{ github.ref_name == 'master' && 'latest' || github.ref_name }}"
          DOCKER_HOST=ssh://karthik@kmac.khost.dev dagger call publish \
            --address ghcr.io/kloudlite/workspace-ide:$TAG
        env:
          DAGGER_CLOUD_TOKEN: ${{ secrets.DAGGER_CLOUD_TOKEN }}
