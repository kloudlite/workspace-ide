name: Docker

on:
  push:
    branches: [master]
    tags: ["v*"]

jobs:
  build:
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Set up Dagger
        uses: dagger/dagger-for-github@v7
        with:
          version: "latest"

      - name: Build and publish
        run: |
          TAG="${{ github.ref_name == 'master' && 'latest' || github.ref_name }}"
          dagger call publish --address ghcr.io/kloudlite/workspace-ide:$TAG
        env:
          DAGGER_CLOUD_TOKEN: ${{ secrets.DAGGER_CLOUD_TOKEN }}
